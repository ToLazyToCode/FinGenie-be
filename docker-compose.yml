#    container_name: fingenie-ollama
#    ports:
#      - "11434:11434"
#    volumes:
#      - ./ollama:/root/.ollama
#    healthcheck:
#      test: ["CMD", "ollama", "list"]
#      interval: 20s
#      timeout: 10s
#      retries: 10
#    restart: unless-stopped
#
#  ollama-init:
#    image: ollama/ollama:latest
#    container_name: fingenie-ollama-init
#    depends_on:
#      ollama:
#        condition: service_healthy
#    entrypoint: [ "/bin/sh", "-c" ]
#    command: "OLLAMA_HOST=http://ollama:11434 ollama pull llama3.2"
#    restart: "no"

  # ===========================================
  # AI Service (Python FastAPI)
  # ===========================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: fingenie-ai-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
#      ollama:
#        condition: service_healthy
#      ollama-init:
#        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # Local host-mode default keeps BE in IntelliJ and infra in Docker.
      # For full docker mode set AI_BACKEND_URL=http://backend:8080.
      BACKEND_URL: ${AI_BACKEND_URL:-http://host.docker.internal:8080}
      AI_MODEL_VERSION: v1.0.0
      AI_FALLBACK_ENABLED: "true"
      LOG_LEVEL: INFO
      VECTOR_ENABLED: "true"
      VECTOR_DB_URL: ${VECTOR_DB_URL:?Set VECTOR_DB_URL in .env}
      VECTOR_TABLE: ai_embeddings
      VECTOR_DIMENSION: 384
      VECTOR_TOP_K: 5
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
#      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
#      OLLAMA_MODEL: llama3.2
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_FAILURE_COOLDOWN_SECONDS: 300
    volumes:
      - ./ai-service:/app
      - ai_models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ===========================================
  # Spring Boot Backend (optional full docker mode)
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fingenie-backend
    profiles: ["fullstack"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?err}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?err}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?err}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?err}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AI_SERVICE_URL: http://ai-service:8000
      MAIL_USERNAME: ${MAIL_USERNAME:?Set MAIL_USERNAME in .env}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?Set MAIL_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===========================================
