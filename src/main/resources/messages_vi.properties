# ============================================
# FinGenie Error Messages - Vietnamese
# ============================================
# 
# Format: ERROR_CODE=Tin nhắn với {0}, {1} placeholder
# Placeholder được điền từ context map của exception
#

# ============================================
# LỖI XÁC THỰC
# ============================================
AUTH_INVALID_CREDENTIALS=Email hoặc mật khẩu không đúng. Vui lòng kiểm tra lại và thử lại.
AUTH_TOKEN_EXPIRED=Phiên đăng nhập của bạn đã hết hạn. Vui lòng đăng nhập lại.
AUTH_TOKEN_INVALID=Token xác thực không hợp lệ. Vui lòng đăng nhập lại.
AUTH_REFRESH_TOKEN_INVALID=Refresh token không hợp lệ. Vui lòng đăng nhập lại.
AUTH_REFRESH_TOKEN_EXPIRED=Phiên đăng nhập của bạn đã hết hạn. Vui lòng đăng nhập lại.
AUTH_ACCESS_DENIED=Bạn không có quyền truy cập tài nguyên này.
AUTH_SESSION_EXPIRED=Phiên đăng nhập đã hết hạn do không hoạt động. Vui lòng đăng nhập lại.
AUTH_ACCOUNT_LOCKED=Tài khoản của bạn đã bị khóa do đăng nhập sai nhiều lần. Vui lòng thử lại sau hoặc liên hệ hỗ trợ.
AUTH_ACCOUNT_DISABLED=Tài khoản của bạn đã bị vô hiệu hóa. Vui lòng liên hệ hỗ trợ để được trợ giúp.
AUTH_EMAIL_NOT_VERIFIED=Vui lòng xác minh địa chỉ email của bạn trước khi đăng nhập.
AUTH_OTP_INVALID=Mã xác minh bạn nhập không đúng. Vui lòng thử lại.
AUTH_OTP_EXPIRED=Mã xác minh đã hết hạn. Vui lòng yêu cầu mã mới.
AUTH_OTP_MAX_ATTEMPTS=Quá nhiều lần thử xác minh. Vui lòng yêu cầu mã mới.

# ============================================
# LỖI NGƯỜI DÙNG
# ============================================
USER_NOT_FOUND=Không tìm thấy người dùng. Người dùng yêu cầu không tồn tại.
USER_EMAIL_ALREADY_EXISTS=Địa chỉ email này đã được sử dụng cho tài khoản khác.
USER_PHONE_ALREADY_EXISTS=Số điện thoại này đã được sử dụng cho tài khoản khác.
USER_PROFILE_INCOMPLETE=Vui lòng hoàn thành hồ sơ của bạn để tiếp tục.

# ============================================
# LỖI XÁC THỰC DỮ LIỆU
# ============================================
VALIDATION_FAILED=Dữ liệu cung cấp không hợp lệ. Vui lòng kiểm tra lại và thử lại.
VALIDATION_FIELD_REQUIRED=Trường này là bắt buộc.
VALIDATION_FIELD_INVALID=Giá trị được cung cấp cho trường này không hợp lệ.
VALIDATION_CONSTRAINT_VIOLATION=Dữ liệu vi phạm một hoặc nhiều ràng buộc.

# ============================================
# LỖI VÍ
# ============================================
WALLET_NOT_FOUND=Không tìm thấy ví. Ví yêu cầu không tồn tại.
WALLET_INSUFFICIENT_BALANCE=Số dư không đủ. Bạn cần {required} nhưng chỉ có {available}.
WALLET_TRANSFER_FAILED=Không thể hoàn thành chuyển khoản. Vui lòng thử lại.
WALLET_ACCESS_DENIED=Bạn không có quyền truy cập ví này.

# ============================================
# LỖI GIAO DỊCH
# ============================================
TRANSACTION_NOT_FOUND=Không tìm thấy giao dịch. Giao dịch yêu cầu không tồn tại.
TRANSACTION_INVALID_AMOUNT=Số tiền giao dịch không hợp lệ. Số tiền phải lớn hơn 0.
TRANSACTION_DUPLICATE=Giao dịch này đã được xử lý.

# ============================================
# LỖI NGÂN SÁCH
# ============================================
BUDGET_NOT_FOUND=Không tìm thấy ngân sách. Ngân sách yêu cầu không tồn tại.
BUDGET_EXCEEDED=Bạn đã vượt quá giới hạn ngân sách {limit}. Chi tiêu hiện tại: {current}.
BUDGET_INVALID_PERIOD=Khoảng thời gian ngân sách không hợp lệ. Vui lòng chọn khoảng ngày hợp lệ.

# ============================================
# LỖI MỤC TIÊU TIẾT KIỆM
# ============================================
PIGGY_GOAL_NOT_FOUND=Không tìm thấy mục tiêu tiết kiệm. Mục tiêu yêu cầu không tồn tại.
PIGGY_GOAL_COMPLETED=Mục tiêu tiết kiệm này đã hoàn thành.

# ============================================
# LỖI THÚ CƯNG
# ============================================
PET_NOT_FOUND=Không tìm thấy thú cưng. Bạn chưa có thú cưng.
PET_ALREADY_EXISTS=Bạn đã có thú cưng rồi. Mỗi người dùng chỉ có thể có một thú cưng.

# ============================================
# LỖI DỊCH VỤ AI
# ============================================
AI_SERVICE_UNAVAILABLE=Trợ lý AI hiện không khả dụng. Vui lòng thử lại sau.
AI_RESPONSE_INVALID=Không thể xử lý phản hồi AI. Vui lòng thử lại.
AI_RATE_LIMITED=Quá nhiều yêu cầu AI. Vui lòng đợi một chút trước khi thử lại.

# ============================================
# LỖI THÔNG BÁO
# ============================================
NOTIFICATION_NOT_FOUND=Không tìm thấy thông báo.
NOTIFICATION_SEND_FAILED=Không thể gửi thông báo. Vui lòng thử lại sau.

# ============================================
# LỖI DỊCH VỤ BÊN NGOÀI
# ============================================
EXTERNAL_SERVICE_UNAVAILABLE=Một dịch vụ bên ngoài hiện không khả dụng. Vui lòng thử lại sau.
EXTERNAL_SERVICE_TIMEOUT=Yêu cầu đến dịch vụ bên ngoài đã hết thời gian chờ. Vui lòng thử lại.
EXTERNAL_SERVICE_ERROR=Đã xảy ra lỗi khi giao tiếp với dịch vụ bên ngoài.

# ============================================
# LỖI GIỚI HẠN TỐC ĐỘ
# ============================================
RATE_LIMIT_EXCEEDED=Quá nhiều yêu cầu. Vui lòng chậm lại và thử lại sau.

# ============================================
# LỖI CƠ SỞ DỮ LIỆU
# ============================================
DATABASE_ERROR=Đã xảy ra lỗi cơ sở dữ liệu. Vui lòng thử lại sau.
DATABASE_CONSTRAINT_VIOLATION=Thao tác không thể hoàn thành do xung đột dữ liệu.

# ============================================
# LỖI HỆ THỐNG
# ============================================
INTERNAL_ERROR=Đã xảy ra lỗi không mong muốn. Vui lòng thử lại sau. Nếu vấn đề vẫn tiếp diễn, hãy liên hệ hỗ trợ.
SERVICE_UNAVAILABLE=Dịch vụ tạm thời không khả dụng. Vui lòng thử lại sau.
CONFIGURATION_ERROR=Đã xảy ra lỗi cấu hình. Vui lòng liên hệ hỗ trợ.

# ============================================
# FALLBACK MẶC ĐỊNH
# ============================================
UNKNOWN_ERROR=Đã xảy ra lỗi không xác định. Vui lòng thử lại sau.
