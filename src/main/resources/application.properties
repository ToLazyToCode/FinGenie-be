# Spring Configuration
spring.application.name=FinGenie
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ============================================
# JPA/Hibernate Configuration
# ============================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# OSIV Configuration - DISABLED for production safety
# ============================================
spring.jpa.open-in-view=false

# Control Spring circular references (prefer breaking cycles in code).
spring.main.allow-circular-references=false

# JWT Configuration
jwt.tokenType=Bearer
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.springframework.transaction=TRACE

# ============================================
# Sentry Error Tracking Configuration
# ============================================
sentry.environment=${spring.profiles.active:local}
sentry.release=${spring.application.name}@1.0.0
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info
sentry.traces-sample-rate=0.1
sentry.server-name=${spring.application.name}
sentry.exception-resolver-order=-2147483647

# APP Environment
api-prefix=/api/v1

# Mail transport (credentials are profile/env-backed)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# Rate Limiting Configuration
# ============================================
fingenie.ratelimit.validation.capacity=10
fingenie.ratelimit.validation.period-minutes=1
fingenie.ratelimit.validation.burst-capacity=5
fingenie.ratelimit.validation.enabled=true

fingenie.ratelimit.auth.login-capacity=5
fingenie.ratelimit.auth.password-reset-capacity=3
fingenie.ratelimit.auth.period-minutes=15
fingenie.ratelimit.auth.lockout-minutes=30
fingenie.ratelimit.auth.enabled=true

fingenie.ratelimit.general.requests-per-minute=100
fingenie.ratelimit.general.burst-capacity=20
fingenie.ratelimit.general.enabled=false

# ============================================
# Security - Token & Session Configuration
# ============================================
security.max-active-devices=5
security.refresh-token.expiration-days=7
security.refresh-token.cleanup-cron=0 0 3 * * *
security.refresh-token.theft-detection-enabled=true

# ============================================
# AI Service Configuration
# ============================================
ai.service.enabled=true
ai.service.timeout-ms=300
ai.client.timeout-seconds=8
ai.client.timeout-seconds.chat=30
ai.client.timeout-seconds.saving-plan-advice=45
ai.client.timeout-seconds.insight=20
ai.client.timeout-seconds.predict=10
ai.client.timeout-seconds.health=3
ai.client.retry-attempts=2

# ============================================
# Billing / Payment Shared Configuration
# ============================================
billing.return-page-auto-redirect-enabled=${BILLING_RETURN_AUTO_REDIRECT_ENABLED:true}
billing.return-page-auto-redirect-delay-ms=${BILLING_RETURN_AUTO_REDIRECT_DELAY_MS:1200}
billing.checkout-expire-minutes=${BILLING_CHECKOUT_EXPIRE_MINUTES:15}
billing.gateway-timeout-ms=${BILLING_GATEWAY_TIMEOUT_MS:8000}

# ============================================
# Abuse Protection: Wallet/Piggy Creation
# ============================================
fingenie.guardrails.wallet.max-per-account=10
fingenie.guardrails.piggy.max-per-account=15
fingenie.guardrails.creation-throttle.enabled=true
fingenie.guardrails.creation-throttle.window-seconds=60
fingenie.guardrails.creation-throttle.wallet-create-max=5
fingenie.guardrails.creation-throttle.piggy-create-max=5

# ============================================
# Dev/Test Mock Data Seeder
# ============================================
fingenie.mock-data.seed.enabled=false

# Fallback configuration
ai.fallback.enabled=true
ai.fallback.cache-ttl-hours=24

# Model configuration
ai.model.version=v1.0.0
ai.model.min-confidence=0.5

# ============================================
# Resilience4j Circuit Breaker Configuration
# ============================================
resilience4j.circuitbreaker.instances.aiService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.aiService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.aiService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.aiService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.aiService.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.aiService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.aiService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.aiService.slowCallRateThreshold=80
resilience4j.circuitbreaker.instances.aiService.slowCallDurationThreshold=500ms
resilience4j.circuitbreaker.instances.aiService.eventConsumerBufferSize=10

resilience4j.ratelimiter.instances.aiService.limitForPeriod=100
resilience4j.ratelimiter.instances.aiService.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.aiService.timeoutDuration=0

resilience4j.retry.instances.aiService.maxAttempts=3
resilience4j.retry.instances.aiService.waitDuration=500ms
resilience4j.retry.instances.aiService.enableExponentialBackoff=true
resilience4j.retry.instances.aiService.exponentialBackoffMultiplier=2
resilience4j.retry.instances.aiService.retryExceptions=java.io.IOException,java.util.concurrent.TimeoutException

resilience4j.timelimiter.instances.aiService.timeoutDuration=300ms
resilience4j.timelimiter.instances.aiService.cancelRunningFuture=true

# ============================================
# Actuator Health Configuration
# ============================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.health.circuitbreakers.enabled=true
management.health.ratelimiters.enabled=true
