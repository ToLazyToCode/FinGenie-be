# ============================================
# FinGenie Error Messages - Default (English)
# ============================================
# This file serves as the fallback when locale-specific message is not found

# Include all messages from messages_en.properties
# This file exists to ensure Spring can find a default

# ============================================
# AUTHENTICATION ERRORS
# ============================================
AUTH_INVALID_CREDENTIALS=Invalid email or password. Please check your credentials and try again.
AUTH_TOKEN_EXPIRED=Your session has expired. Please log in again.
AUTH_TOKEN_INVALID=Invalid authentication token. Please log in again.
AUTH_REFRESH_TOKEN_INVALID=Your refresh token is invalid. Please log in again.
AUTH_REFRESH_TOKEN_EXPIRED=Your session has expired. Please log in again.
AUTH_ACCESS_DENIED=You do not have permission to access this resource.
AUTH_SESSION_EXPIRED=Your session has expired due to inactivity. Please log in again.
AUTH_ACCOUNT_LOCKED=Your account has been locked due to multiple failed login attempts. Please try again later or contact support.
AUTH_ACCOUNT_DISABLED=Your account has been disabled. Please contact support for assistance.
AUTH_EMAIL_NOT_VERIFIED=Please verify your email address before logging in.
AUTH_OTP_INVALID=The verification code you entered is incorrect. Please try again.
AUTH_OTP_EXPIRED=The verification code has expired. Please request a new one.
AUTH_OTP_MAX_ATTEMPTS=Too many verification attempts. Please request a new code.

# ============================================
# USER ERRORS
# ============================================
USER_NOT_FOUND=User not found. The requested user does not exist.
USER_EMAIL_ALREADY_EXISTS=An account with this email address already exists.
USER_PHONE_ALREADY_EXISTS=An account with this phone number already exists.
USER_PROFILE_INCOMPLETE=Please complete your profile to continue.

# ============================================
# VALIDATION ERRORS
# ============================================
VALIDATION_FAILED=The provided data is invalid. Please check your input and try again.
VALIDATION_FIELD_REQUIRED=This field is required.
VALIDATION_FIELD_INVALID=The value provided for this field is invalid.
VALIDATION_CONSTRAINT_VIOLATION=The data violates one or more constraints.

# ============================================
# WALLET ERRORS
# ============================================
WALLET_NOT_FOUND=Wallet not found. The requested wallet does not exist.
WALLET_INSUFFICIENT_BALANCE=Insufficient balance. You need {required} but only have {available}.
WALLET_TRANSFER_FAILED=The transfer could not be completed. Please try again.
WALLET_ACCESS_DENIED=You do not have permission to access this wallet.

# ============================================
# TRANSACTION ERRORS
# ============================================
TRANSACTION_NOT_FOUND=Transaction not found. The requested transaction does not exist.
TRANSACTION_INVALID_AMOUNT=The transaction amount is invalid. Amount must be greater than zero.
TRANSACTION_DUPLICATE=This transaction has already been processed.

# ============================================
# BUDGET ERRORS
# ============================================
BUDGET_NOT_FOUND=Budget not found. The requested budget does not exist.
BUDGET_EXCEEDED=You have exceeded your budget limit of {limit}. Current spending: {current}.
BUDGET_INVALID_PERIOD=The budget period is invalid. Please select a valid date range.

# ============================================
# PIGGY GOAL ERRORS
# ============================================
PIGGY_GOAL_NOT_FOUND=Savings goal not found. The requested goal does not exist.
PIGGY_GOAL_COMPLETED=This savings goal has already been completed.

# ============================================
# PET ERRORS
# ============================================
PET_NOT_FOUND=Pet not found. You don't have a pet yet.
PET_ALREADY_EXISTS=You already have a pet. Each user can only have one pet.

# ============================================
# AI SERVICE ERRORS
# ============================================
AI_SERVICE_UNAVAILABLE=The AI assistant is currently unavailable. Please try again later.
AI_RESPONSE_INVALID=Unable to process AI response. Please try again.
AI_RATE_LIMITED=Too many AI requests. Please wait a moment before trying again.

# ============================================
# NOTIFICATION ERRORS
# ============================================
NOTIFICATION_NOT_FOUND=Notification not found.
NOTIFICATION_SEND_FAILED=Failed to send notification. Please try again later.

# ============================================
# EXTERNAL SERVICE ERRORS
# ============================================
EXTERNAL_SERVICE_UNAVAILABLE=An external service is currently unavailable. Please try again later.
EXTERNAL_SERVICE_TIMEOUT=The request to an external service timed out. Please try again.
EXTERNAL_SERVICE_ERROR=An error occurred while communicating with an external service.

# ============================================
# RATE LIMITING ERRORS
# ============================================
RATE_LIMIT_EXCEEDED=Too many requests. Please slow down and try again later.

# ============================================
# DATABASE ERRORS
# ============================================
DATABASE_ERROR=A database error occurred. Please try again later.
DATABASE_CONSTRAINT_VIOLATION=The operation could not be completed due to a data conflict.

# ============================================
# SYSTEM ERRORS
# ============================================
INTERNAL_ERROR=An unexpected error occurred. Please try again later. If the problem persists, contact support.
SERVICE_UNAVAILABLE=The service is temporarily unavailable. Please try again later.
CONFIGURATION_ERROR=A configuration error occurred. Please contact support.

# ============================================
# GENERIC FALLBACK
# ============================================
UNKNOWN_ERROR=An unknown error occurred. Please try again later.
