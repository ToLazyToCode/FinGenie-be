# Docker profile
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/fingenie}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fingenie}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
ai.service.url=${AI_SERVICE_URL:http://ai-service:8000}

# Credentials and environment-dependent values
jwt.secret=${JWT_SECRET}
GEMINI_API_KEY=${GEMINI_API_KEY}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

oauth2.google.client-id.web=${GOOGLE_CLIENT_ID_WEB}
oauth2.google.client-id.android=${GOOGLE_CLIENT_ID_ANDROID}
oauth2.google.client-id.ios=${GOOGLE_CLIENT_ID_IOS}

billing.public-base-url=${BILLING_PUBLIC_BASE_URL}
billing.mobile-return-url=${BILLING_MOBILE_RETURN_URL}

billing.payos.enabled=${PAYOS_ENABLED}
billing.payos.base-url=${PAYOS_BASE_URL}
billing.payos.client-id=${PAYOS_CLIENT_ID}
billing.payos.api-key=${PAYOS_API_KEY}
billing.payos.checksum-key=${PAYOS_CHECKSUM_KEY}
billing.payos.create-path=${PAYOS_CREATE_PATH}
billing.payos.return-path=${PAYOS_RETURN_PATH}
billing.payos.cancel-path=${PAYOS_CANCEL_PATH}
billing.payos.webhook-path=${PAYOS_WEBHOOK_PATH}

billing.vnpay.enabled=${VNPAY_ENABLED}
billing.vnpay.tmn-code=${VNPAY_TMN_CODE}
billing.vnpay.hash-secret=${VNPAY_HASH_SECRET}
billing.vnpay.pay-url=${VNPAY_PAY_URL}
billing.vnpay.version=${VNPAY_VERSION}
billing.vnpay.command=${VNPAY_COMMAND}
billing.vnpay.order-type=${VNPAY_ORDER_TYPE}
billing.vnpay.locale=${VNPAY_LOCALE}
billing.vnpay.curr-code=${VNPAY_CURR_CODE}
billing.vnpay.return-path=${VNPAY_RETURN_PATH}
billing.vnpay.ipn-path=${VNPAY_IPN_PATH}

management.health.mail.enabled=false
