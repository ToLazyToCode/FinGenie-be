# ============================================
# Docker Container Mode
# Spring Boot runs inside Docker Compose network.
# Use service names instead of localhost.
# ============================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/fingenie}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fingenie}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finpassword}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

ai.service.url=${AI_SERVICE_URL:http://ai-service:8000}

# In docker-compose local stack, SMTP is usually not configured.
# Prevent /actuator/health from going DOWN because of MailHealthIndicator.
management.health.mail.enabled=false
